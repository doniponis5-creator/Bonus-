# ═══════════════════════════════════════════════════════════
# S Bonus — Nginx reverse proxy for smartcentr.store
# VPS: 145.223.100.16
#
# Установка:
#   sudo cp deploy/nginx/smartcentr.store.conf /etc/nginx/sites-available/smartcentr.store
#   sudo ln -sf /etc/nginx/sites-available/smartcentr.store /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d smartcentr.store -d api.smartcentr.store -d admin.smartcentr.store -d cabinet.smartcentr.store -d pos.smartcentr.store
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════

# ─── Redirect HTTP → HTTPS ───
server {
    listen 80;
    server_name smartcentr.store api.smartcentr.store admin.smartcentr.store cabinet.smartcentr.store pos.smartcentr.store;
    return 301 https://$host$request_uri;
}

# ─── API (FastAPI) ───
server {
    listen 443 ssl http2;
    server_name api.smartcentr.store;

    # SSL certs (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/smartcentr.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartcentr.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:18800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ─── Admin Panel (Next.js) ───
