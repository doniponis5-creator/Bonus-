# ─── Root domain → Admin redirect ───
server {
    listen 443 ssl http2;
    server_name smartcentr.store;

    ssl_certificate     /etc/letsencrypt/live/smartcentr.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartcentr.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://admin.smartcentr.store$request_uri;
}
